<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WorldWebWindows</title>
<link rel="stylesheet" href="style.css?v=6">
</head>
<body>

<header>
<img src="logo.png" class="logo">
</header>

<div class="container">
  <h2>Enter Token ID</h2>
  <input type="number" id="tokenId" min="1" max="2400" placeholder="1 - 2400">
  <button onclick="loadBanner()">Load Banner</button>

  <br><br>

  <!-- Canvas visuale (per anteprima) -->
  <canvas id="canvasView" width="996" height="332"></canvas>
  <!-- Canvas reale invisibile (per disegno e download) -->
  <canvas id="canvasReal" width="1992" height="664" style="display:none;"></canvas>

  <div id="uploadArea"></div>

  <br>
  <button onclick="downloadBanner()">Download Banner</button>
</div>

<script src="script.js?v=6"></script>
</body>
</html>
