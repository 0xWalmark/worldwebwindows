<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WorldWebWindows</title>
<link rel="stylesheet" href="style.css?v=46">
</head>
<body>

<header>
<img src="logo.png" class="logo">
</header>

<div class="container">
  <h2 id="tokenLabel">Enter Token ID</h2>
  <input type="number" id="tokenId" min="1" max="2400" placeholder="1 - 2400">
  <button onclick="loadBanner()">Load Banner</button>

  <!-- Easter Egg message sotto input -->
  <div id="easterEggMsg" style="margin-top:10px; font-size:16px; color:#fff;"></div>

  <br><br>

  <!-- Canvas visivo ridotto per adattarsi allo schermo -->
  <canvas id="canvasView"></canvas>
  <!-- Canvas reale invisibile per download -->
  <canvas id="canvasReal" width="1992" height="664" style="display:none;"></canvas>

  <div id="uploadArea"></div>

  <br>
  <button onclick="downloadBanner()">Download Banner</button>
</div>

<script src="script.js?v=46"></script>
</body>
</html>
